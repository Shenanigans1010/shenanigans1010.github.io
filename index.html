<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki</title>

  <!-- Make it behave more like an app on iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Manifest (optional) -->
  <link rel="manifest" href="manifest.json">

  <!-- Custom icon -->
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: #f8f8f8;
      flex-direction: column;
    }
    .open-btn {
      display: none; /* Hidden initially */
      padding: 20px 40px;
      font-size: 24px;
      background: #1a73e8;
      color: white;
      border-radius: 20px;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      margin-top: 20px;
    }
    .open-btn:hover {
      background: #1558b0;
    }
    .message {
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="message">Tap the button below to open AnkiWeb</div>
  <a id="open-btn" href="https://ankiweb.net" target="_blank" class="open-btn">Open AnkiWeb</a>

  <script>
    // Show the button after 2 seconds to avoid iOS auto-redirect
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('open-btn').style.display = 'inline-block';
      }, 2000);
    });
  </script>
</body>
</html>
